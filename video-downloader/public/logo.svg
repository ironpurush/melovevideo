<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 52" fill="none">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
  </defs>
  <!-- Icon background -->
  <rect x="2" y="6" width="40" height="40" rx="10" fill="url(#grad1)"/>
  <!-- Play button -->
  <polygon points="14,19 14,33 26,26" fill="white" opacity="0.95"/>
  <!-- Download arrow -->
  <line x1="30" y1="21" x2="30" y2="31" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  <polyline points="26,28 30,32 34,28" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <line x1="26" y1="35" x2="34" y2="35" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <!-- Text -->
  <text x="50" y="23" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="700" fill="url(#grad1)">Video</text>
  <text x="50" y="40" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="700" fill="#94a3b8">Downloader</text>
</svg>
